name: Feature request
description: Propose an enhancement to Routeplane CE
title: "feat: "
labels: ["type:enhancement", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended ideas or "would this make sense?" conversations, prefer
        [Discussions — Ideas](https://github.com/routeplane-core/routeplane-ce/discussions/categories/ideas);
        maintainers promote accepted ideas into issues. Use this form when the request is
        concrete enough to act on.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution — the workload, the failure, the cost.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the gateway do? Include the API/config surface if you have one in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you're using today, or other designs that could solve it.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Provider adapters
        - Routing / fallback / combos
        - Caching
        - Rate & spend limits
        - RTK token compression
        - Auth / virtual keys
        - Streaming
        - Self-hosting (compose / config)
        - Observability / logs
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions and this is not a duplicate.
          required: true

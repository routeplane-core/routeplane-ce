# Build the Routeplane CE container image, publish it to GHCR, and sign it
# (cosign keyless via GitHub OIDC) with an attached SPDX SBOM.
# Runs on a version tag (release) and on manual dispatch (validation).
# TODO(launch): SHA-pin the third-party actions to digests; add multi-arch (arm64).
name: image

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # attach SBOM/compose/digest assets to the tag's release
  packages: write
  id-token: write # cosign keyless (Fulcio/Rekor)
  attestations: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Image scans use syft's "image" cataloger set, which OMITS the Rust
      # cargo-lock cataloger. Without this, the Cargo.lock shipped into the
      # image is ignored and the SBOM lists only the Debian base. '+' force-adds
      # it so the crates are enumerated. Job-level on purpose: the pinned
      # sbom-action version below is proven to propagate job env to syft;
      # newer sbom-action releases dropped step-env propagation.
      SYFT_SELECT_CATALOGERS: "+rust-cargo-lock-cataloger"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/routeplane-core/routeplane-ce
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest
            type=raw,value=ci,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single-manifest image: no buildkit provenance/SBOM attestations, which
          # would wrap the tag in an OCI index whose digest differs from the signed
          # manifest — making `cosign verify <tag>` fail. We attach our own syft
          # SBOM below. This keeps tag digest == steps.build.outputs.digest == the
          # digest cosign signs, so verify-by-tag works. Also lets `load: true`
          # import a plain image for the smoke test.
          provenance: false
          sbom: false

      # Runtime smoke test: boot the image we just built and confirm the gateway
      # serves /healthz. Loads keys from the shipped example so it starts cleanly.
      - name: Smoke test (boot + /healthz)
        env:
          # the :ci tag is loaded into the local daemon by `load: true` above;
          # run by tag (a registry @digest isn't resolvable in the local daemon).
          IMAGE_REF: ghcr.io/routeplane-core/routeplane-ce:ci
        run: |
          set -euo pipefail
          docker run -d --name rp-smoke -p 8080:8080 \
            -e RP_KEYS_FILE=./configs/keys.example.json -e RUST_LOG=info \
            "$IMAGE_REF"
          ok=""
          for i in $(seq 1 20); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/healthz)" = "200" ]; then
              ok=1; echo "healthz: 200 OK after $((i*3))s"; break
            fi
            sleep 3
          done
          echo "--- container logs (tail) ---"; docker logs --tail=20 rp-smoke || true
          docker rm -f rp-smoke >/dev/null 2>&1 || true
          [ -n "$ok" ] || { echo "::error::gateway did not answer /healthz"; exit 1; }

      # Supply-chain trust: sign the pushed image (keyless — the signature's
      # identity is this workflow, verifiable with `cosign verify`) and attach an
      # SPDX SBOM as a signed attestation. See the README "Verify what you run".
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/routeplane-core/routeplane-ce@${DIGEST}"

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0 — propagates SYFT_* job env; newer versions don't
        with:
          # scan the image loaded locally by `load: true` (by tag) — syft pulling
          # the registry @digest fails auth in-job; the local scan is equivalent.
          image: ghcr.io/routeplane-core/routeplane-ce:ci
          format: spdx-json
          output-file: sbom.spdx.json
          # the explicit release-assets step below owns publishing (the action's
          # auto-attach uses its own naming and needs the release to preexist)
          upload-release-assets: false

      - name: SBOM sanity gate (crates enumerated)
        run: |
          set -euo pipefail
          CARGO_PKGS=$(python3 -c "import json; d=json.load(open('sbom.spdx.json')); print(sum(1 for p in d.get('packages',[]) for r in p.get('externalRefs',[]) if r.get('referenceLocator','').startswith('pkg:cargo')))")
          echo "pkg:cargo entries: ${CARGO_PKGS}"
          if [ "${CARGO_PKGS}" -eq 0 ]; then
            echo "::error::SBOM is inert — zero pkg:cargo entries (cataloger regression?)"; exit 1
          fi

      - name: Attest the SBOM to the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type spdxjson --predicate sbom.spdx.json "ghcr.io/routeplane-core/routeplane-ce@${DIGEST}"

      # Release assets: every tagged release carries the compose file, the SPDX
      # SBOM, and the exact image digest + verify command ("verify what you run").
      # The release for the tag must already exist (created at tag time).
      - name: Attach release assets (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cp sbom.spdx.json "routeplane-ce-${TAG}.spdx.json"
          {
            echo "image:  ghcr.io/routeplane-core/routeplane-ce:${TAG}"
            echo "digest: ${DIGEST}"
            echo
            echo "Pull by digest (immutable):"
            echo "  docker pull ghcr.io/routeplane-core/routeplane-ce@${DIGEST}"
            echo
            echo "Verify the signature (cosign, keyless — identity is this repo's image.yml workflow):"
            echo "  cosign verify ghcr.io/routeplane-core/routeplane-ce:${TAG} \\"
            echo "    --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "    --certificate-identity-regexp \\"
            echo "      '^https://github\\.com/routeplane-core/routeplane-ce/\\.github/workflows/image\\.yml@refs/'"
          } > "image-digest-${TAG}.txt"
          gh release upload "${TAG}" \
            "routeplane-ce-${TAG}.spdx.json" \
            "image-digest-${TAG}.txt" \
            docker-compose.yml \
            --clobber
